paths:
  # from routes/page/description.js
  /{domain}/v1/page/description/{title}:
    get:
      tags:
        - Page content
      summary: Get page description
      description: |
        Returns a description of a page. A page description is a short, plain-text phrase
        summarizing the topic of a page.

        On English Wikipedia, page descriptions are maintained locally and use the same license as
        Wikipedia articles. On all other Wikimedia projects, page descriptions come from the
        corresponding topic on Wikidata and use Wikidata's license.
      parameters:
        - $ref: "#/components/parameters/domainParam"
        - $ref: "#/components/parameters/title"
        - name: Accept-Language
          in: header
          description: |
            Language of the description, including the language variant if applicable.
            Defaults to the wiki's primary language
          schema:
            type: string
      responses:
        200:
          $ref: "#/components/responses/description"
        404:
          description: Unknown page title or revision, or description not available
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/problem"
        default:
          $ref: "#/components/responses/problem"
      x-amples:
        - title: Get description for test page
          request:
            params:
              title: San_Francisco
          response:
            status: 200
            headers:
              content-type: application/json
              content-language: en
              vary: /.+/
              access-control-allow-origin: "*"
              access-control-allow-headers: accept, x-requested-with, content-type
              content-security-policy: default-src 'none'; frame-ancestors 'none'
              x-content-security-policy: default-src 'none'; frame-ancestors 'none'
              x-frame-options: SAMEORIGIN
            body:
              description: /.+/
    put:
      tags:
        - Page content
      summary: Update page description
      description: |
        Updates or creates a page description. Page descriptions contributed to English Wikipedia
        are licensed under the same license as Wikipedia articles. Page descriptions contributed
        to other Wikimedia projects are stored on Wikidata and licensed under the Wikidata license.
      parameters:
        - $ref: "#/components/parameters/domainParam"
        - $ref: "#/components/parameters/title"
        - name: Content-Language
          in: header
          description: |
            Language of the description, including the language variant if applicable.
            Defaults to the wiki's primary language
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                description:
                  description: Page description in plain text
                  type: string
                comment:
                  description: |
                    Reason for editing the description, automatically prepended
                    by an autogenerated comment
                  type: string
              required:
                - description
      responses:
        201:
          $ref: "#/components/responses/description"
        401:
          $ref: "#/components/responses/problem"
        501:
          $ref: "#/components/responses/problem"
        default:
          $ref: "#/components/responses/problem"
      x-monitor: false

    delete:
      tags:
        - Page content
      summary: Delete page description
      description: |
        Deletes a page description from Wikidata or, for English Wikipedia,
        from the local description.
      parameters:
        - $ref: "#/components/parameters/domainParam"
        - $ref: "#/components/parameters/title"
        - name: Content-Language
          in: header
          description: |
            Language of the description, including the language variant if applicable.
            Defaults to the wiki's primary language
          schema:
            type: string
      responses:
        204:
          description: Success. Description deleted
        401:
          $ref: "#/components/responses/problem"
        501:
          $ref: "#/components/responses/problem"
        default:
          $ref: "#/components/responses/problem"
      x-monitor: false

components:
  responses:
    description:
      description: Description for the requested page
      headers:
        Content-Language:
          schema:
            type: string
          description: |
            Language of the description, including the language variant if applicable.
            Defaults to the wiki's primary language
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/description"
  schemas:
    description:
      type: object
      properties:
        description:
          type: string
          description: Description of the page
          example: Russian poet
      additionalProperties: false
